{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link rel="stylesheet" href="{% static 'product/checkout.css' %}">
</head>
<body>
    <div class="container">
        <div class="media">
            <img
                src="{% if product.image_url %}{{ product.image_url }}{% else %}https://images.pexels.com/photos/1084199/pexels-photo-1084199.jpeg?auto=compress&cs=tinysrgb&w=1200{% endif %}"
                alt="{{ product.name }}"
                loading="lazy"
                referrerpolicy="no-referrer"
                data-fallback="https://images.pexels.com/photos/1084199/pexels-photo-1084199.jpeg?auto=compress&cs=tinysrgb&w=1200"
            >
        </div>
        <h2>Checkout</h2>
        <p>Product: {{ product.name }}</p>
        <p>{{ product.description }}</p>
        <p class="price">Rs. {{ product.price }}</p>
        <button id="rzp-button1">Pay Now</button>
        <p id="pay-error" style="display:none; margin: 14px 0 0; color: #b91c1c;"></p>
    </div>

    <script>
        document.getElementById("rzp-button1").addEventListener("click", async function (e) {
            e.preventDefault();
            const btn = e.currentTarget;
            const errEl = document.getElementById("pay-error");
            errEl.style.display = "none";
            errEl.textContent = "";
            btn.disabled = true;
            btn.textContent = "Starting…";

            try {
                const createResp = await fetch("{% url 'create_payment' product.id %}", {
                    method: "POST",
                    credentials: "same-origin",
                    headers: { "X-Requested-With": "XMLHttpRequest" }
                });
                const data = await createResp.json();

                if (!createResp.ok) {
                    throw new Error(data.error || "Failed to create payment order");
                }

                const options = {
                    key: data.key || data.key_id,
                    amount: data.amount,
                    currency: data.currency || "INR",
                    name: "Razorpay Demo Store",
                    description: data.product_name || "Order payment",
                    order_id: data.order_id,
                    callback_url: data.callback_url,
                    redirect: true,
                    theme: {
                        color: "#3399cc"
                    }
                };

                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function () {
                    window.location.href = "{% url 'payment_failed' %}";
                });
                rzp.open();
            } catch (error) {
                errEl.textContent = error.message || "Something went wrong while starting payment.";
                errEl.style.display = "block";
            }
            finally {
                btn.disabled = false;
                btn.textContent = "Pay Now";
            }
        });

        (function () {
            const imgs = document.querySelectorAll('img[data-fallback]');
            for (const img of imgs) {
                img.addEventListener('error', function () {
                    const fallback = img.getAttribute('data-fallback');
                    if (fallback && img.src !== fallback) img.src = fallback;
                });
            }
        })();
    </script>
</body>
</html>
