<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 48px 16px;
        }

        .container {
            background: white;
            max-width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .price {
            font-size: 20px;
            color: green;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background: #3399cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #287aa3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Checkout</h2>
        <p>Product: {{ product.name }}</p>
        <p>{{ product.description }}</p>
        <p class="price">Rs. {{ product.price }}</p>
        <button id="rzp-button1">Pay Now</button>
        <p id="pay-error" style="display:none; margin: 14px 0 0; color: #b91c1c;"></p>
    </div>

    <script>
        document.getElementById("rzp-button1").addEventListener("click", async function (e) {
            e.preventDefault();
            const btn = e.currentTarget;
            const errEl = document.getElementById("pay-error");
            errEl.style.display = "none";
            errEl.textContent = "";
            btn.disabled = true;
            btn.textContent = "Starting…";

            try {
                const createResp = await fetch("{% url 'create_payment' product.id %}", {
                    method: "POST",
                    credentials: "same-origin",
                    headers: { "X-Requested-With": "XMLHttpRequest" }
                });
                const data = await createResp.json();

                if (!createResp.ok) {
                    throw new Error(data.error || "Failed to create payment order");
                }

                const options = {
                    key: data.key || data.key_id,
                    amount: data.amount,
                    currency: data.currency || "INR",
                    name: "Razorpay Demo Store",
                    description: data.product_name || "Order payment",
                    order_id: data.order_id,
                    callback_url: data.callback_url,
                    redirect: true,
                    theme: {
                        color: "#3399cc"
                    }
                };

                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function () {
                    window.location.href = "{% url 'payment_failed' %}";
                });
                rzp.open();
            } catch (error) {
                errEl.textContent = error.message || "Something went wrong while starting payment.";
                errEl.style.display = "block";
            }
            finally {
                btn.disabled = false;
                btn.textContent = "Pay Now";
            }
        });
    </script>
</body>
</html>
