<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fef2f2 0%, #f8fafc 60%, #fee2e2 100%);
            padding: 24px;
        }
        .card {
            width: min(720px, 100%);
            background: white;
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 20px 55px rgba(15, 23, 42, 0.12);
            text-align: center;
        }
        h1 { margin: 0 0 10px; }
        p { margin: 0 auto 22px; max-width: 520px; color: #475569; line-height: 1.6; }
        .actions { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        a {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            background: #ef4444;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .secondary {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Payment Failed</h1>
        <p>The payment was cancelled, failed, or could not be verified. Please try again.</p>
        <div class="actions">
            <a href="{% url 'product_list' %}">Try Another Product</a>
            <a class="secondary" href="{% url 'home' %}">Back to Home</a>
        </div>
    </div>
</body>
</html>
