{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <link rel="stylesheet" href="{% static 'product/failed.css' %}">
</head>
<body>
    <div class="card">
        <div class="media">
            <img
                src="https://images.pexels.com/photos/1084199/pexels-photo-1084199.jpeg?auto=compress&cs=tinysrgb&w=1200"
                alt="Payment failed"
                loading="lazy"
            >
        </div>
        <h1>Payment Failed</h1>
        <p>The payment was cancelled, failed, or could not be verified. Please try again.</p>
        <div class="actions">
            <a href="{% url 'product_list' %}">Try Another Product</a>
            <a class="secondary" href="{% url 'home' %}">Back to Home</a>
        </div>
    </div>
</body>
</html>
